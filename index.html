<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="考研专注是本地优先的 Windows 学习专注应用，提供番茄节奏、白名单约束、课表计划、复盘统计和可选云端同步。"
    />
    <meta name="theme-color" content="#f8fbff" />
    <script>
      (() => {
        const colors = {
          dark: '#08111d',
          light: '#f8fbff',
          mono: '#f2f1ed',
          dawn: '#f7fbf8',
          forest: '#071612',
          sakura: '#f8fbff',
        };
        let theme = 'light';
        try {
          const stored = localStorage.getItem('kaoyan-focus-theme');
          if (stored && Object.prototype.hasOwnProperty.call(colors, stored)) {
            theme = stored;
          }
        } catch {
          // Keep the light shell default when storage is unavailable.
        }
        document.documentElement.dataset.theme = theme;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
          meta.setAttribute('content', colors[theme]);
        }
      })();
    </script>
    <meta property="og:title" content="考研专注" />
    <meta
      property="og:description"
      content="本地优先的 Windows 备考专注工作台：专注计时、白名单约束、任务计划、复盘统计与可选同步。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233869d4'/%3E%3Cpath d='M18 16h20a8 8 0 0 1 8 8v28H22a6 6 0 0 1-6-6V18a2 2 0 0 1 2-2Z' fill='%23fff' opacity='.96'/%3E%3Cpath d='M22 24h18M22 32h18M22 40h12' stroke='%23269b76' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <title>考研专注</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
